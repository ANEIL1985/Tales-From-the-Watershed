<!DOCTYPE html>
<html>
<head>
  <title>Watershed Stories</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([41.5, -71.45], 12); // center on your watershed

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Add watershed boundary
fetch("https://services2.arcgis.com/S8zZg9pg23JUEexQ/arcgis/rest/services/HYDRO_Watersheds_HUC12/FeatureServer/6/query?where=OBJECTID=8&outFields=*&f=geojson")
  .then(response => response.json())
  .then(data => {
    L.geoJSON(data, {
      style: {
        color: "#1e40af",        // deep blue outline
        weight: 2,
        fillColor: "#60a5fa",    // lighter blue fill
        fillOpacity: 0.2
      }
    }).addTo(map);
  })
  .catch(error => console.error("Error loading watershed:", error));
    
    // Add a sample story point
    L.marker([41.5, -71.45]).addTo(map)
      .bindPopup("<b>The River Mouth</b><br>A short story about tides and time.")
      .openPopup();
  </script>
</body>
</html>
