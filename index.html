<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Pettasquamscutt Chronicle</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Georgia', serif;
  }

  /* Title Banner */
  header {
    background: #003366;
    color: white;
    text-align: center;
    padding: 1rem 0;
    font-size: 1.5rem;
    font-weight: bold;
    z-index: 1000;
  }

  header span {
    display: block;
    font-size: 1rem;
    font-style: italic;
    margin-top: 0.3rem;
  }

  /* Map container */
  #map {
    width: 100%;
    height: calc(100% - 80px);
    position: absolute;
    top: 80px;
    left: 0;
  }

  /* Sidebar styling */
  .sidebar {
    position: fixed;
    top: 0;
    right: -400px;
    width: 400px;
    height: 100%;
    background: white;
    box-shadow: -3px 0 10px rgba(0, 0, 0, 0.3);
    overflow-y: auto;
    padding: 20px;
    transition: right 0.3s ease;
    z-index: 1001;
  }

  .sidebar.open {
    right: 0;
  }

  #closeSidebar {
    background: none;
    border: none;
    font-size: 24px;
    float: right;
    cursor: pointer;
  }

  /* About button */
  #aboutButton {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #003366;
    color: white;
    border: none;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
    z-index: 1100;
  }

  /* About popup */
  #aboutPopup {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: white;
    border: 1px solid #ccc;
    padding: 15px;
    width: 280px;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
    display: none;
    z-index: 1100;
  }

  #aboutPopup p {
    margin: 0;
    font-size: 0.9rem;
    line-height: 1.3rem;
  }
</style>
</head>

<body>
  <header>
    The Pettasquamscutt Chronicle
    <span>Where the Water Remembers</span>
  </header>

  <div id="map"></div>

  <!-- Sidebar for story -->
  <div id="sidebar" class="sidebar">
    <button id="closeSidebar">&times;</button>
    <div id="sidebarContent"></div>
  </div>

  <!-- About button and popup -->
  <button id="aboutButton">i</button>
  <div id="aboutPopup">
    <p><strong>About the Chronicle:</strong><br>
    All stories within <em>The Pettasquamscutt Chronicle</em> are works of fiction. 
    Each tale draws inspiration from the watershed’s landscape, history, and imagination, 
    reminding us that the water remembers what we forget.</p>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Initialize map
    const map = L.map('map').setView([41.5134, -71.4477], 13);

    // Satellite basemap
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '&copy; Esri, Maxar, Earthstar Geographics'
    }).addTo(map);

    // Stories array
    const stories = [
      {
        coords: [41.5134394329345, -71.44777572841639],
        title: "What Lurks Beneath",
        date: "04/10/2024",
        content: `
        <p>As the sun cast its first golden rays over the tranquil waters of the Pettasquamscutt Estuary, Evelyn stood at the edge of her dock, her vibrant red kayak gently swaying beside her. For Evelyn, there was no better way to greet her day than with these moments of serene solitude, before the world stirred to life.</p>
        <p>The Upper Pond, Evelyn's sanctuary, was a marvel of nature. Carved by ancient glaciers, its steep-sided banks plunged to depths of approximately 40 feet, harboring a mysterious anoxic zone devoid of oxygen. Despite being nestled amidst forests, the Pond felt remote, a testament to its pristine beauty that attracted scientists from around the globe.</p>
        <p>As Evelyn paddled across the glassy surface of the Pond, a gentle mist enveloped her surroundings, adding to the ethereal atmosphere of dawn. Imagining the ancestral journey of river herring beneath her, Evelyn's paddle strokes became a rhythmic cadence in harmony with nature's symphony. Yet, her tranquility was shattered by a foul odor that tainted the crisp morning air, signaling an unsettling change in the waters below.</p>
        <p>With a growing sense of unease, Evelyn's senses heightened as she drifted towards the center of the Pond, where the water had taken on an unnatural milky hue. Suddenly, ripples disrupted the stillness, followed by a rush of bubbles emerging from the depths, sending a shiver down Evelyn's spine.</p>
        <p>Heart pounding, Evelyn desperately tried to turn her kayak, but a powerful current surged beneath her, tossing her into the murky depths. Gasping for air, she struggled against the suffocating darkness, her futile cries swallowed by the silent abyss.</p>
        <p>Meanwhile, in the depths of the anoxic zone, a primordial creature stirred from its slumber, drawn to the surface by ancient instincts. With a thunderous surge, the creature breached the water's surface, casting a shadow of terror over Evelyn. Paralyzed with fear, she watched as the creature vanished as swiftly as it had appeared, leaving only ripples in its wake.</p>
        <p>Clutching her overturned kayak, Evelyn fought to regain her composure as the waters calmed around her. With each stroke towards home, the memory of her encounter lingered, a haunting reminder of the mysteries lurking beneath the tranquil surface of the Upper Pond.</p>

        `
      },
      {
        coords: [41.4964376996236, -71.44382698828555],
        title: "The Howling",
        date: "10/01/2024",
        content: `
        <p>The car struck the beast with a sickening crunch, sending it sprawling across the road. Sarah slammed on the brakes, skidding to a stop. Her chest heaved as she gripped the steering wheel, eyes locked on the twisted figure in her rearview mirror.</p>
        <p>It didn’t move.</p>
        <p>For a moment, she sat frozen. Then, heart pounding, she stepped out of the car, gripping the tire iron she’d grabbed in her rush. The beast lay in the road, its grotesque body crumpled beneath the moonlight. Its eyes, once blazing with fury, now stared lifeless into the void.</p>
        <p>She approached cautiously, her breath visible in the cold night air. It was massive—larger than any animal she’d ever seen—and its body bore an unnatural composition of scales and matted fur. The claws alone could have gutted her.</p>
        <p>Raising the tire iron, she brought it down on the beast’s head once, twice, three times, until its skull caved in. She dropped the weapon and staggered back to her car, her body trembling as adrenaline faded. It was over.</p>
        <p>Or so she thought.</p>
        <p>The weeks that followed brought relief to the neighborhood. Missing pets ceased, and the eerie howls that had haunted the nights fell silent. Sarah became the reluctant hero of the East side, though few fully believed her account of what she had killed. Most dismissed it as a particularly vicious coyote or rabid dog.</p>
        <p>By the following spring, life returned to normal. The posters were gone, neighbors walked their pets freely again, and Sarah found herself almost believing it had all been a bad dream.</p>
        <p>Almost.</p>
        <p>One crisp autumn night, exactly a year later, Sarah stood on her porch, gazing out at the Narrow River as a gentle breeze rustled the trees. The memories of that night had dulled but never fully faded. She shook her head, forcing a smile as she went back inside.</p>
        <p>Then she heard it.</p>
        <p>Low and guttural at first, but unmistakable. A howl.</p>
        <p>Her stomach dropped as the sound rose, echoing across the river. It wasn’t alone—another howl joined in, then another, weaving into an unearthly chorus that sent a shiver through her soul.</p>
        <p>Her blood ran cold. She stepped back inside and bolted the door, heart racing as the howls grew louder.</p>
        <p>In the moonlight, far across the river, she swore she saw them—shapes moving, golden eyes glowing like embers in the night.</p>
        <p><strong>This time, she knew, it wasn’t over.</strong></p>
        `
      }
    ];

    // Add all stories to the map
    stories.forEach((story, index) => {
      const popupContent = `
        <b>${story.title}</b><br>${story.date}<br>
        <a href="#" class="readMoreLink" data-index="${index}">Read more</a>
      `;

      const marker = L.marker(story.coords).addTo(map).bindPopup(popupContent);
    });

    // Sidebar functionality
    document.addEventListener("click", (e) => {
      if (e.target && e.target.classList.contains("readMoreLink")) {
        e.preventDefault();
        const index = e.target.getAttribute("data-index");
        const story = stories[index];
        document.getElementById("sidebarContent").innerHTML =
          "<h2>" + story.title + "</h2><p><em>" + story.date + "</em></p>" + story.content;
        document.getElementById("sidebar").classList.add("open");
        map.closePopup();
      }
    });

    document.getElementById("closeSidebar").onclick = () => {
      document.getElementById("sidebar").classList.remove("open");
    };

    // About button toggle
    const aboutButton = document.getElementById("aboutButton");
    const aboutPopup = document.getElementById("aboutPopup");

    aboutButton.onclick = () => {
      aboutPopup.style.display = (aboutPopup.style.display === "block") ? "none" : "block";
    };

    // Load watershed boundary
    fetch("https://services2.arcgis.com/S8zZg9pg23JUEexQ/arcgis/rest/services/HYDRO_Watersheds_HUC12/FeatureServer/6/query?outFields=*&where=OBJECTID=8&f=geojson")
      .then(response => response.json())
      .then(data => {
        L.geoJSON(data, {
          style: {
            color: "#00BFFF",
            weight: 2,
            fillOpacity: 0.1
          }
        }).addTo(map);
      })
      .catch(err => console.error("Watershed load error:", err));
  </script>
</body>
</html>
