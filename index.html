<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pettasquamscutt Chronicle</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  body {
    margin: 0;
    font-family: 'Georgia', serif;
  }

  /* Title Banner */
  header {
    background: #003366;
    color: white;
    text-align: center;
    padding: 1rem 0;
    font-size: 1.5rem;
    font-weight: bold;
  }

  header span {
    display: block;
    font-size: 1rem;
    font-style: italic;
    margin-top: 0.3rem;
  }

  /* Map container */
  #map {
    width: 100%;
    height: 100vh;
  }

  /* Sidebar styling */
  .sidebar {
    position: fixed;
    top: 0;
    right: -400px;
    width: 400px;
    height: 100%;
    background: white;
    box-shadow: -3px 0 10px rgba(0, 0, 0, 0.3);
    overflow-y: auto;
    padding: 20px;
    transition: right 0.3s ease;
    z-index: 1000;
  }

  .sidebar.open {
    right: 0;
  }

  #closeSidebar {
    background: none;
    border: none;
    font-size: 24px;
    float: right;
    cursor: pointer;
  }

  /* About button */
  #aboutButton {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #003366;
    color: white;
    border: none;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    z-index: 1200;
  }

  /* About popup */
  #aboutPopup {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: white;
    border: 1px solid #ccc;
    padding: 15px;
    width: 280px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    display: none;
    z-index: 1200;
  }

  #aboutPopup p {
    margin: 0;
    font-size: 0.9rem;
    line-height: 1.3rem;
  }
</style>
</head>
<body>

<header>
  The Pettasquamscutt Chronicle
  <span>Where the Water Remembers</span>
</header>

<div id="map"></div>

<!-- Sidebar for story -->
<div id="sidebar" class="sidebar">
  <button id="closeSidebar">&times;</button>
  <div id="sidebarContent"></div>
</div>
