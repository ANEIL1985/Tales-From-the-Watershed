<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>What Lurks Beneath</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: Georgia, serif;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: #003366;
  color: #fff;
  z-index: 1200;
  display: flex;
  align-items: center;
  justify-content: center;
}

header h1 {
  margin: 0;
  font-size: 1.4rem;
  letter-spacing: 1px;
}

/* MAP */
#map {
  position: absolute;
  top: 80px;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1;
}

/* ABOUT BUTTON */
#aboutButton {
  position: fixed;
  left: 16px;
  bottom: 16px;
  z-index: 1500;
  background: #003366;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
}

#aboutPopup {
  position: fixed;
  left: 16px;
  bottom: 70px;
  width: 300px;
  background: white;
  padding: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.3);
  z-index: 1500;
  display: none;
  border-radius: 8px;
}

/* LEGEND */
.legend {
  background: rgba(0, 0, 0, 0.9);
  color: white;
  padding: 18px 22px;
  border-radius: 14px;
  font-size: 16px;
  line-height: 1.7;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  border: 2px solid #00BFFF;
  max-width: 240px;
}

.legend b {
  font-size: 17px;
  display: block;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.legend span {
  font-size: 18px;
  margin-right: 6px;
}

/* Make markers glow */
.leaflet-interactive {
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
}
</style>
</head>
<body>

<header>
  <h1>What Lurks Beneath</h1>
</header>

<div id="map"></div>

<button id="aboutButton">About</button>
<div id="aboutPopup">
  Inspired by the watershed.<br><br>
  From the mind of neilion22@gmail.com
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

/* =========================
   MAP INITIALIZATION
========================= */
const map = L.map('map', { preferCanvas: true })
  .setView([41.5134, -71.4477], 13);

L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {
    attribution: '&copy; Esri, Maxar, Earthstar Geographics',
    maxZoom: 19
  }
).addTo(map);


/* =========================
   CATEGORY STYLES
========================= */
const categoryStyles = {
  community: { color: '#00FFFF', fillColor: '#00FFFF' },
  historical: { color: '#FFD700', fillColor: '#FFD700' },
  news: { color: '#FF3300', fillColor: '#FF3300' },
  police: { color: '#0066FF', fillColor: '#0066FF' },
  memories: { color: '#32CD32', fillColor: '#32CD32' }
};


/* =========================
   POSTS
========================= */
const posts = [
  {
    title: "Strange Odor Reported Near the River",
    date: "November 16, 2024",
    category: "news",
    coords: [41.510885, -71.446273],
    snippet: "Residents reported a rotten egg smell coming from the river."
  },
  {
    title: "Don't Swim Too Deep",
    date: "March 01, 2025",
    category: "memories",
    coords: [41.513744603803325, -71.44777539056291],
    snippet: "My grandfather warned us not to swim in the middle of the pond. Said there were stories of missing kids."
  }
];


/* =========================
   ADD POSTS TO MAP
========================= */
posts.forEach(post => {

  const style = categoryStyles[post.category];

  const popup = `
    <b>${post.title}</b><br>
    <small>${post.date} | ${post.category.toUpperCase()}</small><br><br>
    ${post.snippet}
  `;

  L.circleMarker(post.coords, {
    radius: 12,
    color: style.color,
    fillColor: style.fillColor,
    fillOpacity: 1,
    weight: 3
  })
  .addTo(map)
  .bindPopup(popup);

});


/* =========================
   LEGEND
========================= */
const legend = L.control({ position: 'bottomright' });

legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <b>Post Types</b>
    <span style="color:#00FFFF">●</span> Community<br>
    <span style="color:#FFD700">●</span> Historical<br>
    <span style="color:#FF3300">●</span> News Report<br>
    <span style="color:#0066FF">●</span> Police Report<br>
    <span style="color:#32CD32">●</span> Memories
  `;
  return div;
};

legend.addTo(map);


/* =========================
   WATERSHED BOUNDARY
========================= */
fetch("https://services2.arcgis.com/S8zZg9pg23JUEexQ/arcgis/rest/services/HYDRO_Watersheds_HUC12/FeatureServer/6/query?where=OBJECTID=8&outFields=*&f=geojson")
  .then(r => r.json())
  .then(geojson => {
    L.geoJSON(geojson, {
      style: {
        color: '#00BFFF',
        weight: 3,
        fillOpacity: 0.08
      }
    }).addTo(map);
  });


/* =========================
   ABOUT BUTTON TOGGLE
========================= */
const aboutBtn = document.getElementById("aboutButton");
const aboutPopup = document.getElementById("aboutPopup");

aboutBtn.onclick = () => {
  aboutPopup.style.display =
    aboutPopup.style.display === "block" ? "none" : "block";
};

</script>
</body>
</html>
