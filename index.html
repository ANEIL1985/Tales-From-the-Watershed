<!DOCTYPE html>
<html>
<head>
  <title>Watershed Stories</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([41.5, -71.45], 12); // center on your watershed

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Add a sample story point
    L.marker([41.5, -71.45]).addTo(map)
      .bindPopup("<b>The River Mouth</b><br>A short story about tides and time.")
      .openPopup();
  </script>
</body>
</html>
