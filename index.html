<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tales from the Watershed</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: Georgia, serif;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: #003366;
  color: #fff;
  z-index: 1200;
  display: flex;
  align-items: center;
  justify-content: center;
}

header h1 {
  margin: 0;
  font-size: 1.4rem;
  letter-spacing: 1px;
}

/* MAP */
#map {
  position: absolute;
  top: 80px;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1;
}

/* ABOUT BUTTON */
#aboutButton {
  position: fixed;
  left: 16px;
  bottom: 16px;
  z-index: 1500;
  background: #003366;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
}

#aboutPopup {
  position: fixed;
  left: 16px;
  bottom: 70px;
  width: 300px;
  background: white;
  padding: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.3);
  z-index: 1500;
  display: none;
  border-radius: 8px;
}

/* LEGEND */
.legend {
  background: rgba(0, 0, 0, 0.9);
  color: white;
  padding: 18px 22px;
  border-radius: 14px;
  font-size: 16px;
  line-height: 1.7;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  border: 2px solid #00BFFF;
  max-width: 240px;
}

.legend b {
  font-size: 17px;
  display: block;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.legend span {
  font-size: 18px;
  margin-right: 6px;
}

/* Make markers glow */
.leaflet-interactive {
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
}
</style>
</head>
<body>

<header>
  <h1>Tales From The Watershed</h1>
</header>

<div id="map"></div>

<button id="aboutButton">About</button>
<div id="aboutPopup">
  @TALESFROMTHEWATERSHED <br><br>
  talesfromthewatershed@gmail.com

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

/* =========================
   MAP INITIALIZATION
========================= */
const map = L.map('map')
  .setView([41.5134, -71.4477], 13);

L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {
    attribution: '&copy; Esri, Maxar, Earthstar Geographics',
    maxZoom: 19
  }
).addTo(map);


/* =========================
   CATEGORY STYLES
========================= */
const categoryStyles = {
  Community: { color: '#00FFFF', fillColor: '#00FFFF' },
  News: { color: '#FF3300', fillColor: '#FF3300' },
  Police: { color: '#0066FF', fillColor: '#0066FF' },
  Memories: { color: '#32CD32', fillColor: '#32CD32' }, 
  Geological: {color: '#5E4B3C',fillColor: '#8C6A4D'},
  Ecological: {color: '#1B5E20',fillColor: '#4CAF50'},
  Cultural: {color: '#1A237E',fillColor: '#3F51B5'},
  Folklore: {color: '#4A148C',fillColor: '#9C27B0'}
}


/* =========================
   POSTS
========================= */
const posts = [
  {
  title: "Ancient Flooded Valley",
  date: "c. 500 BCE",
  category: "Geological",
  coords: [41.540581, -71.471617],
  snippet: `Roughly 2,500 years ago, rising Atlantic waters flooded a glacial valley, 
    transforming it into the tidal estuary we now call the Narrow River.`
},
{
  title: "Glacial Carved Ponds",
  date: "c. 14,000 BCE",
  category: "Geological",
  coords: [41.502343, -71.450559],
  snippet: `Upper and Lower Ponds were carved by retreating glaciers more than 16,000 years ago, 
  leaving behind deep kettle basins now filled with brackish water.`
},
{
  title: "Anoxic Depths",
  date: "Ancient",
  category: "Ecological",
  coords: [41.514091, -71.447713],
  snippet: `The deepest waters of the ponds naturally lose oxygen each year, creating dark, 
  anoxic zones where unusual microbial life thrives.`
},
{
  title: "Sulfur-Based Life",
  date: "Ongoing",
  category: "Ecological",
  coords: [41.512750, -71.447398],
  snippet: `In the oxygen-free depths, microorganisms survive using sulfur chemistry instead of oxygen, 
  forming rare ecosystems studied by scientists worldwide.`
},
{
  title: "The Great Overturn",
  date: "Recurring",
  category: "Ecological",
  coords: [41.504156, -71.450662],
  snippet: `Every decade or so, deep sulfur-rich waters rise suddenly to the surface in an event called an overturn, 
  turning the ponds milky and pungent.  During overturn events, 
  hydrogen sulfide gas escapes into the air, producing a powerful "rotten egg" scent detectable across the watershed.`
},
  {
    title: "Strange Odor Reported Near the River",
    date: "November 16, 2024",
    category: "News",
    coords: [41.510885, -71.446273],
    snippet: `Residents reported a rotten egg smell outside.`
  },
  {
    title: "Don't Swim At Night",
    date: "March 3, 1985",
    category: "Folklore",
    coords: [41.513744603803325, -71.44777539056291],
    snippet: `My grandfather used to warn us to never to swim in the ponds at night. 
    He said thats when the monsters come out to play.`
  }
    ];


/* =========================
   ADD POSTS TO MAP
========================= */
posts.forEach(post => {

  const style = categoryStyles[post.category];

  const marker = L.circleMarker(post.coords, {
    radius: 8,
    color: style.color,
    fillColor: style.fillColor,
    fillOpacity: 1,
    weight: 2
  }).addTo(map);

  marker.bringToFront();

const popupContent = `
  <b>${style.icon} ${post.title}</b><br>
  <small>${post.date}</small><br><br>
  ${post.snippet}
`;

marker.bindPopup(popupContent);

});




/* =========================
   LEGEND
========================= */
const legend = L.control({ position: 'bottomright' });

legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <b>Post Types</b>
    <span style="color:#00FFFF">●</span> Community<br>
    <span style="color:#FFD700">●</span> Archives<br>
    <span style="color:#FF3300">●</span> News Report<br>
    <span style="color:#0066FF">●</span> Police Report<br>
    <span style="color:#32CD32">●</span> Memories
  `;
  return div;
};

legend.addTo(map);


/* =========================
   WATERSHED BOUNDARY
========================= */
fetch("https://services2.arcgis.com/S8zZg9pg23JUEexQ/arcgis/rest/services/HYDRO_Watersheds_HUC12/FeatureServer/6/query?where=OBJECTID=8&outFields=*&f=geojson")
  .then(r => r.json())
  .then(geojson => {
    L.geoJSON(geojson, {
      style: {
        color: '#00BFFF',
        weight: 3,
        fillOpacity: 0.08
      }
    }).addTo(map).bringToBack();
  });


/* =========================
   ABOUT BUTTON TOGGLE
========================= */
const aboutBtn = document.getElementById("aboutButton");
const aboutPopup = document.getElementById("aboutPopup");

aboutBtn.onclick = () => {
  aboutPopup.style.display =
    aboutPopup.style.display === "block" ? "none" : "block";
};

</script>
</body>
</html>
